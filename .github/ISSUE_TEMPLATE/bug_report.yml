name: Bug report
description: Report a reproducible bug
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more reproducible, the faster we can fix it.
        If this is a security issue, do not file here — see SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One- or two-sentence description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps a maintainer can follow to see the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or screenshots if available.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse --short HEAD` or the release tag you tested.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where does it happen?
      options:
        - Web (apps/web)
        - API (apps/api)
        - Database / Prisma (packages/db)
        - Build / tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, database version.
      placeholder: |
        OS: macOS 14.5
        Node: 20.11.1
        Browser: Chrome 126
        Postgres: 16.2
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else worth knowing (recent changes, related PRs, etc.).
