name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the proposed solution. Issues that lead with a use case get triaged faster.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or workflow gap is this addressing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would this work from the user's perspective?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you didn't pick them.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Mockups, links to related issues, prior art, etc.
